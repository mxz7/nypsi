name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build

    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/setup

      - name: build
        run: npx tsc --build

      - name: save build artifacts
        uses: actions/cache/save@v5
        with:
          path: dist/
          key: build-${{ runner.os }}-${{ github.sha }}

  lint:
    name: linting
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/setup

      - name: linting
        run: pnpm run lint

  formatting:
    name: formatting
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/setup

      - name: check formatting
        run: pnpm run format:check

  test:
    name: tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/setup

      - name: restore build artifacts
        uses: actions/cache/restore@v5
        with:
          path: dist/
          key: build-${{ runner.os }}-${{ github.sha }}

      - name: run tests
        run: pnpm run test

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [lint, test]
    concurrency: deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup
        uses: ./.github/actions/setup

      - name: restore build artifacts
        uses: actions/cache/restore@v5
        with:
          path: dist/
          key: build-${{ runner.os }}-${{ github.sha }}

      - name: prepare files for deploy
        run: |
          mkdir deploy
          mv dist/ deploy/
          mv package.json deploy/
          mv pnpm-lock.yaml deploy/
          mv data/ deploy/
          mv prisma/ deploy/
          mv tsconfig.json deploy/
          mv prisma.config.ts deploy/

      - name: deploy
        uses: burnett01/rsync-deployments@8.0.4
        with:
          switches: -rtvh --partial --progress --delete --exclude='dist/utils/functions/anticheat.js' --exclude='node_modules/' --exclude='out/' --exclude='.env'
          path: deploy/
          remote_path: ~/nypsi/
          remote_host: ${{ secrets.HOST }}
          remote_port: 22
          remote_user: ${{ secrets.USERNAME }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: connect to server & update packages
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: 22
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/nypsi
            nvm use lts
            npm i -g pnpm
            pnpm install --frozen-lockfile
